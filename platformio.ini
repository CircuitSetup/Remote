; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev
data_dir = src/data

[env:esp32dev]
platform = platformio/espressif32
framework = arduino
board = nodemcu-32s
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
lib_deps = 
	;earlephilhower/ESP8266Audio @ ^1.9.7
	;https://github.com/tzapu/WiFiManager.git
	ArduinoJson @ ^6.21.5
upload_speed = 921600
monitor_speed = 115200
build_flags = 
	-std=gnu++11
	-mtarget-align
	-Iinclude
	;see remote_global.h for full explanations of these options
	-DHAVE_CRSF			   ;enables support for CRSF protocol with an ELRS module
	#-DREMOTE_DBG		   ;enables serial debug
	#-DHAVE_VOL_ROTENC     ;enables support for a Volume rotary encoder
	#-DUSE_SPIFFS	   ;use SPIFFS for arduinoespressif32 < 2.0, otherwise use LittleFS - If LittleFS uncomment board_build.filesystem below

board_build.filesystem = LittleFS  ;uncomment if using LittleFS - make sure USE_SPIFFS IS commented above
build_src_flags = 
	-DDEBUG_PORT=Serial
	-ggdb
;uncomment the following to use the esp32 exception decoder
#monitor_filters = esp32_exception_decoder
#build_type = debug 

[env:native_elrs]
platform = platformio/windows_x86
lib_deps =
	throwtheswitch/Unity @ ^2.6.1
build_src_filter =
	+<src/CRSF/elrs_crsf_core.cpp>
	+<src/CRSF/elrs_crsf_transport.cpp>
	+<../test/native_elrs/test_native_elrs.cpp>
build_flags =
	-std=gnu++11
	-DHAVE_CRSF
	-Isrc
	-Isrc/src/CRSF
	-Iinclude
